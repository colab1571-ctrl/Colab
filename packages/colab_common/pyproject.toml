[project]
name = "colab-common"
version = "0.1.0"
description = "Shared Python library for all Colab FastAPI services"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "Proprietary" }
dependencies = [
    # Settings
    "pydantic>=2.9,<3",
    "pydantic-settings>=2.6,<3",
    "boto3>=1.35,<2",
    # Database
    "sqlalchemy[asyncio]>=2.0.36,<3",
    "asyncpg>=0.30,<1",
    "alembic>=1.13,<2",
    # Auth
    "PyJWT[crypto]>=2.9,<3",
    "cryptography>=43,<45",
    # Web / async
    "fastapi>=0.115,<1",
    "httpx>=0.27,<1",
    "aio-pika>=9.4,<10",
    # Observability
    "structlog>=24.1,<25",
    "sentry-sdk[fastapi]>=2.18,<3",
    "opentelemetry-sdk>=1.28,<2",
    "opentelemetry-instrumentation-fastapi>=0.49b0",
    "opentelemetry-exporter-otlp-proto-grpc>=1.28,<2",
    # Tasks
    "celery[redis]>=5.4,<6",
    "celery-redbeat>=2.2,<3",
    "kombu>=5.3,<6",
    # Redis
    "redis[hiredis]>=5.2,<6",
]

[project.optional-dependencies]
testing = [
    "pytest>=8.3,<9",
    "pytest-asyncio>=0.24,<1",
    "pytest-cov>=6.0,<7",
    "httpx>=0.27,<1",
    "testcontainers[postgres,redis,rabbitmq]>=4.8,<5",
    "freezegun>=1.5,<2",
    "factory-boy>=3.3,<4",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/colab_common"]

[tool.uv]
dev-dependencies = [
    "colab-common[testing]",
    "ruff>=0.8,<1",
    "mypy>=1.13,<2",
    "types-boto3>=1.35,<2",
]
