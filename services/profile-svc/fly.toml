# fly.toml — profile-svc (colab-profile-prod)
# Free tier: shared-cpu-1x, 256MB RAM, min 0 / max 1 machines
# Note: profile-svc uses ffmpeg + chromaprint; these are baked into the Dockerfile.

app = "colab-profile-prod"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"
  [build.args]
    GIT_SHA = "dev"
    IMAGE_TAG = "dev"

[env]
  ENV = "prod"
  LOG_LEVEL = "info"
  PORT = "8000"
  PYTHONUNBUFFERED = "1"

[[services]]
  internal_port = 8000
  protocol = "tcp"
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [[services.ports]]
    force_https = true
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [services.concurrency]
    type = "requests"
    hard_limit = 25
    soft_limit = 20

  [[services.http_checks]]
    interval = "30s"
    timeout = "10s"
    grace_period = "20s"
    method = "GET"
    path = "/healthz"
    protocol = "http"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
