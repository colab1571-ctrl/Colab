# Alembic configuration for gateway-svc
# Cross-service note: gateway-svc hosts the waitlist_emails table as a thin marketing-web
# integration table. If a dedicated marketing-svc is created in future, this table migrates there.

[alembic]
script_location = migrations
prepend_sys_path = .

# Connection string is injected at runtime via DATABASE_URL env var
# Do not hardcode credentials here.
sqlalchemy.url = %(DATABASE_URL)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
