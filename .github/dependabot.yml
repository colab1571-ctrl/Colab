version: 2

updates:
  # ---------------------------------------------------------------------------
  # Python services — one entry per service
  # ---------------------------------------------------------------------------
  - package-ecosystem: "pip"
    directory: "/services/auth-svc"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    groups:
      auth-svc-production:
        dependency-type: "production"
      auth-svc-dev:
        dependency-type: "development"
    labels: ["dependencies", "python", "auth-svc"]

  - package-ecosystem: "pip"
    directory: "/services/billing-svc"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      billing-svc-production:
        dependency-type: "production"
    labels: ["dependencies", "python", "billing-svc"]

  - package-ecosystem: "pip"
    directory: "/services/chat-svc"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels: ["dependencies", "python", "chat-svc"]

