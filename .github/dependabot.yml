  # ---------------------------------------------------------------------------
  # npm — Next.js apps
  # ---------------------------------------------------------------------------
  - package-ecosystem: "npm"
    directory: "/apps/consumer-web"
    schedule:
      interval: "weekly"
      day: "tuesday"
    open-pull-requests-limit: 5
    groups:
      consumer-web-deps:
        patterns: ["*"]
    labels: ["dependencies", "npm", "consumer-web"]

  - package-ecosystem: "npm"
    directory: "/apps/marketing-web"
    schedule:
      interval: "weekly"
      day: "tuesday"
    open-pull-requests-limit: 5
    labels: ["dependencies", "npm", "marketing-web"]

  - package-ecosystem: "npm"
    directory: "/apps/admin-web"
    schedule:
      interval: "weekly"
      day: "tuesday"
    open-pull-requests-limit: 5
    labels: ["dependencies", "npm", "admin-web"]

  # ---------------------------------------------------------------------------
  # npm — React Native / Expo
  # ---------------------------------------------------------------------------
  - package-ecosystem: "npm"
    directory: "/apps/mobile"
    schedule:
      interval: "weekly"
      day: "tuesday"
    open-pull-requests-limit: 5
    groups:
      mobile-expo:
        patterns: ["expo*", "@expo/*"]
      mobile-react-native:
        patterns: ["react-native*", "@react-native*"]
      mobile-other:
        exclude-patterns: ["expo*", "@expo/*", "react-native*", "@react-native*"]
    labels: ["dependencies", "npm", "mobile"]

  # ---------------------------------------------------------------------------
  # npm — shared packages
  # ---------------------------------------------------------------------------
  - package-ecosystem: "npm"
    directory: "/packages/ui"
    schedule:
      interval: "weekly"
      day: "tuesday"
    open-pull-requests-limit: 3
    labels: ["dependencies", "npm", "ui-lib"]

  - package-ecosystem: "npm"
    directory: "/packages/design-tokens"
    schedule:
      interval: "weekly"
      day: "tuesday"
    open-pull-requests-limit: 3
    labels: ["dependencies", "npm", "design-tokens"]

  - package-ecosystem: "npm"
    directory: "/packages/api-types"
    schedule:
      interval: "weekly"
      day: "tuesday"
    open-pull-requests-limit: 3
    labels: ["dependencies", "npm", "api-types"]

  - package-ecosystem: "npm"
    directory: "/packages/i18n"
    schedule:
      interval: "weekly"
      day: "tuesday"
    open-pull-requests-limit: 3
    labels: ["dependencies", "npm", "i18n"]

  # ---------------------------------------------------------------------------
  # Docker base images — all Dockerfiles
  # ---------------------------------------------------------------------------
  - package-ecosystem: "docker"
    directory: "/services/auth-svc"
    schedule:
      interval: "weekly"
      day: "wednesday"
    open-pull-requests-limit: 2
    labels: ["dependencies", "docker", "auth-svc"]

  - package-ecosystem: "docker"
    directory: "/services/billing-svc"
    schedule:
      interval: "weekly"
      day: "wednesday"
    open-pull-requests-limit: 2
    labels: ["dependencies", "docker"]

  - package-ecosystem: "docker"
    directory: "/services/chat-svc"
    schedule:
      interval: "weekly"
      day: "wednesday"
    open-pull-requests-limit: 2
    labels: ["dependencies", "docker"]

  - package-ecosystem: "docker"
    directory: "/services/gateway-svc"
    schedule:
      interval: "weekly"
      day: "wednesday"
    open-pull-requests-limit: 2
    labels: ["dependencies", "docker"]

  # ---------------------------------------------------------------------------
  # GitHub Actions — workflow action version pins
  # ---------------------------------------------------------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "wednesday"
    open-pull-requests-limit: 10
    groups:
      github-actions:
        patterns: ["*"]
    labels: ["dependencies", "github-actions"]
