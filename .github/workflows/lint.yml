name: Lint

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main", "feature/**"]

jobs:
  python-lint:
    name: Python lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.5.4"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install deps
        run: uv sync --all-packages

      - name: ruff check
        run: uv run ruff check .

      - name: ruff format check
        run: uv run ruff format --check .

      - name: mypy strict
        run: uv run mypy --strict packages/colab_common/src services

  js-lint:
    name: JS/TS lint (eslint + prettier + typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: "9.15.0"

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build packages (for type resolution)
        run: pnpm run build --filter @colab/design-tokens --filter @colab/ui

      - name: Prettier check
        run: pnpm run format:check

      - name: TypeScript typecheck (all TS packages + apps)
        run: pnpm run typecheck
