name: Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main", "feature/**"]

jobs:
  python-test:
    name: Python tests (pytest + coverage)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: colab
          POSTGRES_PASSWORD: colab
          POSTGRES_DB: colab_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      JWT_SECRET: test-secret
      ENV: local
      DATABASE_URL: postgresql+asyncpg://colab:colab@localhost:5432/colab_test
      REDIS_URL: redis://localhost:6379/1
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.5.4"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install deps
        run: uv sync --all-packages

      - name: Run colab_common tests
        run: uv run pytest packages/colab_common/tests -v --cov=colab_common --cov-report=xml --cov-fail-under=80

      - name: Run gateway-svc tests
        run: uv run pytest services/gateway-svc/tests -v

      - name: Run hello-svc tests
        run: uv run pytest services/hello-svc/tests -v

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        if: always()
        with:
          file: coverage.xml

  js-test:
    name: JS/TS tests (vitest + jest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: "9.15.0"

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm run test
