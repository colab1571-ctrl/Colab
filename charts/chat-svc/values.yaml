# chat-svc Helm values

svc:
  image:
    repository: ""  # ECR URI set by CI
    tag: "latest"

  replicas: 3  # Minimum 3 for HA; HPA scales further

  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "2000m"
      memory: "1Gi"

  # HPA — scales on CPU AND custom ws_connections metric
  hpa:
    enabled: true
    minReplicas: 3
    maxReplicas: 20
    targetCPUUtilizationPercentage: 60
    # Custom metric: ws_connections per pod
    # Requires Prometheus adapter + custom metric API
    customMetrics:
      - type: Pods
        pods:
          metric:
            name: ws_connections_per_pod
          target:
            type: AverageValue
            averageValue: "1000"  # Scale when avg > 1000 WS connections per pod

  serviceAccount:
    create: true
    annotations:
      # IRSA role: no AWS permissions needed for chat-svc (Redis + RabbitMQ only)
      eks.amazonaws.com/role-arn: ""

  # PodDisruptionBudget — ensure at least 2 pods available during rolling deploy
  pdb:
    enabled: true
    minAvailable: 2

  # Affinity: spread across AZs for resilience
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: DoNotSchedule
      labelSelector:
        matchLabels:
          app: chat-svc

  env:
    ENV: "staging"
    LOG_LEVEL: "INFO"

    # Moderation-svc (ClusterIP)
    CHAT_MODERATION_SVC_URL: "http://moderation-svc:8000"
    CHAT_MODERATION_SCAN_TIMEOUT_MS: "250"

    # Rate limits
    CHAT_SEND_RATE_PER_MINUTE: "30"
    CHAT_TYPING_RATE_SECONDS: "3"
    CHAT_READ_ACK_RATE_PER_MINUTE: "60"
    CHAT_MAX_RECONNECT_FRAMES: "5"

    # Message limits
    CHAT_MAX_BODY_LENGTH: "4000"
    CHAT_REPLAY_PAGE_SIZE: "200"

    # Presence
    CHAT_PRESENCE_TTL_SECONDS: "90"

    # Connection expiry (API GW 2-hour limit)
    CHAT_CONNECTION_EXPIRY_SECONDS: "7200"
    CHAT_EXPIRY_WARNING_AT_SECONDS: "6900"

  envFromSecret: "chat-svc-env"

  externalSecret:
    refreshInterval: "1h"
    secretStoreRef: "colab-cluster-store"
    remoteRef: "colab/staging/chat-svc/env"
    # Secret contains:
    #   DATABASE_URL      — PostgreSQL connection string (asyncpg)
    #   REDIS_URL         — ElastiCache Redis cluster URL
    #   RABBITMQ_URL      — RabbitMQ connection string

  service:
    type: ClusterIP
    port: 8000

  # Readiness probe — HTTP (WS upgrade not needed for health)
  readinessProbe:
    httpGet:
      path: /healthz
      port: 8000
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 3

  livenessProbe:
    httpGet:
      path: /healthz
      port: 8000
    initialDelaySeconds: 30
    periodSeconds: 30
    failureThreshold: 3

  # Graceful shutdown — allow in-flight WS frames to drain
  terminationGracePeriodSeconds: 30

  # uvloop + single worker per pod (scale horizontally)
  command:
    - uvicorn
    - app.main:app
    - --host
    - "0.0.0.0"
    - --port
    - "8000"
    - --loop
    - uvloop
    - --workers
    - "1"
